name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Type-check, lint & build
    runs-on: ubuntu-latest
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      # Turbopack fetches Google Fonts at build time with its own TLS stack;
      # trust the system CA store so the fetch works behind a proxy. Harmless
      # on standard runners.
      NEXT_TURBOPACK_EXPERIMENTAL_USE_SYSTEM_TLS_CERTS: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      # Lint runs for visibility but does not gate the build yet: the repo
      # carries a pre-existing backlog (no-explicit-any, React-hooks rules).
      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Build
        run: npm run build
